<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가전팀 신상품·재촬영 실적</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#EEF1F7; --bg2:#F8F9FC; --bg3:#F0F3F8;
    --border:rgba(99,120,160,0.12); --border2:rgba(99,120,160,0.22);
    --text1:#1E2840; --text2:#4A5568; --text3:#8A97B0;
    --green:#0E9E6A; --green-bg:rgba(14,158,106,0.10);
    --amber:#C97A10; --amber-bg:rgba(201,122,16,0.10);
    --red:#D63A52;   --red-bg:rgba(214,58,82,0.10);
    --blue:#2563EB;  --blue-bg:rgba(37,99,235,0.10);
    --purple:#6D3FC8; --purple-bg:rgba(109,63,200,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text1);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;}

  .page-header{background:var(--bg2);border-bottom:2px solid var(--border2);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(30,40,64,0.08);}
  .page-header-left{display:flex;align-items:center;gap:14px;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:12px;font-weight:500;text-decoration:none;transition:all .15s;font-family:'IBM Plex Mono',monospace;}
  .back-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:rgba(37,99,235,0.3);}
  .page-title{font-size:18px;font-weight:700;color:var(--text1);letter-spacing:-0.3px;}
  .page-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  .page-tag{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:5px;border:1px solid rgba(37,99,235,0.35);color:var(--blue);background:var(--blue-bg);}
  .header-right{display:flex;gap:8px;align-items:center;}
  .nav-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--blue);color:#fff;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;font-family:'IBM Plex Mono',monospace;box-shadow:0 2px 8px rgba(37,99,235,0.25);transition:all .2s;}
  .nav-link:hover{background:#1d4ed8;transform:translateY(-1px);}

  .content{padding:24px 28px 60px;max-width:1400px;margin:0 auto;}
  .section{margin-bottom:32px;}
  .section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border2);}

  /* 요약 카드 3종 */
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
  .summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:0 2px 8px rgba(30,40,64,0.06);position:relative;overflow:hidden;}
  .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .sc-purple::before{background:linear-gradient(90deg,#6D3FC8,#9B7FFF);}
  .sc-blue::before{background:linear-gradient(90deg,#2563EB,#60A5FA);}
  .sc-gray::before{background:linear-gradient(90deg,#8A97B0,#C8D3E4);}
  .sc-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:8px;font-weight:500;}
  .sc-val{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:6px;}
  .sc-sub{font-size:11px;color:var(--text3);}

  /* MD별 비중 카드 */
  .md-ratio-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .md-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 2px 8px rgba(30,40,64,0.06);}
  .md-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .md-name{font-size:13px;font-weight:700;color:var(--text1);}
  .md-total{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .md-stack-bar{width:100%;height:24px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:10px;background:var(--bg3);}
  .md-stack-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:'IBM Plex Mono',monospace;}
  .md-legend{display:flex;flex-direction:column;gap:5px;}
  .md-legend-row{display:flex;justify-content:space-between;align-items:center;font-size:10px;}
  .md-legend-label{display:flex;align-items:center;gap:5px;color:var(--text2);}
  .md-legend-dot{width:7px;height:7px;border-radius:2px;display:inline-block;}
  .md-legend-val{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--text1);}
  .md-rank-badge{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:10px;font-weight:700;}

  /* 탭 */
  .tab-row{display:flex;gap:6px;margin-bottom:16px;}
  .tab-btn{padding:7px 18px;font-size:12px;font-family:'IBM Plex Mono',monospace;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500;}
  .tab-btn:hover{background:var(--bg3);color:var(--text1);}
  .active-tab{background:var(--blue)!important;border-color:var(--blue)!important;color:#fff!important;font-weight:700!important;}

  /* 정렬 */
  .sort-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;}
  .sort-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .sort-btn{padding:4px 12px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text2);cursor:pointer;}
  .sort-btn:hover{background:var(--bg2);color:var(--text1);}
  .sort-active{background:var(--blue-bg)!important;color:var(--blue)!important;border-color:rgba(37,99,235,0.4)!important;font-weight:700!important;}

  /* 테이블 */
  .prod-table{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(30,40,64,0.05);}
  .prod-table th{text-align:left;padding:11px 14px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border2);background:var(--bg3);font-family:'IBM Plex Mono',monospace;}
  .prod-table td{padding:11px 14px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text1);}
  .prod-table tr:last-child td{border-bottom:none;}
  .prod-table tr:hover td{background:rgba(99,120,160,0.04);}
  .pname{font-weight:600;}
  .pcat-badge{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:600;}
  .pmd-badge{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .good{color:#0A8558;font-weight:700;}
  .bad{color:#C42E45;font-weight:700;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  @media(max-width:900px){
    .md-ratio-grid{grid-template-columns:repeat(2,1fr);}
    .summary-grid{grid-template-columns:1fr;}
  }
</style>
</head>

function renderMdRatio(){

function showTab(tab){
  currentTab = tab;
  document.getElementById('tab-shin').classList.remove('active-tab');
  document.getElementById('tab-re').classList.remove('active-tab');
  document.getElementById('tab-'+tab).classList.add('active-tab');
  render();
}

function setSort(key){
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('sort-active'));
  document.getElementById('sort-'+key).classList.add('sort-active');
  render();
}

    const mrCls = p.mr >= 30 ? 'good' : p.mr < 20 ? 'bad' : '';
    return `<tr>
      <td class="mono" style="color:var(--text3);">${i+1}</td>
      <td><span class="pcat-badge" style="background:${catColor}18;color:${catColor};">${p.cat}</span></td>
      <td class="pname">${p.name}</td>
      <td><span class="pmd-badge" style="color:${mdColor};font-weight:600;">${p.md}</span></td>
      <td class="mono">${p.cnt}회</td>
      <td class="mono" style="color:var(--text3);">${monthsStr}</td>
      <td class="mono" style="font-weight:700;">${p.s.toFixed(3)}억</td>
      <td class="mono ${pmCls}">${p.pm.toFixed(1)}만</td>
      <td class="mono">${p.m.toFixed(3)}억</td>
      <td class="mono ${mrCls}">${p.mr.toFixed(1)}%</td>
    </tr>`;
  }).join('');

  document.getElementById('tableArea').innerHTML = `
    <table class="prod-table">
      <thead>
        <tr>
          <th>#</th><th>카테고리</th><th>상품명</th><th>MD</th><th>방송</th><th>편성월</th>
          <th>취급고</th><th>분당취급고</th><th>한계이익</th><th>이익률</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

renderMdRatio();
render();
</script>
</body>
</html>
