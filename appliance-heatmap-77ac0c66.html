<script>
(function(){
  var PW_HASH = "ed268775853e8ce7516aca7017150b900240141f2e6d7273d8ea84dc6a7c2fdb";
  var SESSION_KEY = "appliance_team_auth_2026";
  function sha256(str){
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    });
  }
  function unlock(){
    document.getElementById('pwGateOverlay').style.display = 'none';
    document.documentElement.style.overflow = '';
  }
  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    unlock();
  } else {
    document.documentElement.style.overflow = 'hidden';
  }
  window.pwGateCheck = function(){
    var val = document.getElementById('pwGateInput').value;
    sha256(val).then(function(hash){
      if (hash === PW_HASH) {
        sessionStorage.setItem(SESSION_KEY, 'ok');
        unlock();
      } else {
        document.getElementById('pwGateError').style.display = 'block';
        document.getElementById('pwGateInput').value = '';
      }
    });
  };
  document.addEventListener('DOMContentLoaded', function(){
    var input = document.getElementById('pwGateInput');
    if (input) {
      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter') pwGateCheck();
      });
      input.focus();
    }
  });
})();
</script>

<script>
let DATA = [];
let ALL_BC = [];
let currentCat='', currentQ='';
let currentTarget = null; // null = 전체 합산

const DAY_LABELS = ['월','화','수','목','금','토','일'];
const DAY_GETDAY = [1,2,3,4,5,6,0]; // Date.getDay() 매핑 (0=일)
const CAT_COLORS = { '생활가전':'#2563EB','주방가전':'#0E9E6A','주방용품':'#6D3FC8','대형가전':'#C97A10' };

fetch('data/search-data.json').then(r => r.json()).then(d => {
  DATA = d;
  ALL_BC = DATA.flatMap(p => (p.bc||[]).map(bc => bc));
  renderHeatmapFor(null);
}).catch(e => {
  document.getElementById('hmGrid').innerHTML = '<div class="empty-state">⚠️ 데이터를 불러오지 못했습니다</div>';
  console.error(e);
});

function parseHour(t){
  if(!t) return null;
  const start = t.split('~')[0].trim();
  const hh = parseInt(start.substring(0,2), 10);
  return isNaN(hh) ? null : hh;
}
function parseWeekdayIdx(d){
  if(!d) return null;
  const parts = d.split('/');
  if(parts.length !== 3) return null;
  const dt = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  const gd = dt.getDay();
  const idx = DAY_GETDAY.indexOf(gd);
  return idx === -1 ? null : idx;
}

function buildGrid(bcList){
  const grid = Array.from({length:7}, () => Array.from({length:24}, () => ({w:0, s:0, cnt:0, pm:0})));
  let totalW=0, totalS=0, totalCnt=0, maxW=0;
  (bcList||[]).forEach(bc => {
    const di = parseWeekdayIdx(bc.d);
    const hi = parseHour(bc.t);
    if(di===null || hi===null) return;
    const c = grid[di][hi];
    c.w += bc.w||0; c.s += bc.s||0; c.cnt += 1;
    totalW += bc.w||0; totalS += bc.s||0; totalCnt += 1;
  });
  grid.forEach(row => row.forEach(c => {
    c.pm = c.w>0 ? (c.s*10000/c.w) : 0;
    if(c.w > maxW) maxW = c.w;
  }));
  const avgPm = totalW>0 ? (totalS*10000/totalW) : 0;
  return { grid, totalW, totalS, totalCnt, avgPm, maxW };
}

function cellHTML(c, maxW, avgPm){
  if(!c || c.w<=0){
    return `<div class="hm-cell hm-empty"></div>`;
  }
  const intensity = maxW>0 ? Math.min(1, c.w/maxW) : 0;
  const alpha = (0.12 + intensity*0.78).toFixed(2);
  const textColor = intensity>0.55 ? '#fff' : 'var(--text1)';
  let borderColor = 'var(--border2)';
  if(avgPm>0){
    if(c.pm >= avgPm*1.15) borderColor = 'var(--green)';
    else if(c.pm <= avgPm*0.85) borderColor = 'var(--red)';
  }
  const tip = `가중분 ${c.w.toFixed(0)}분 · 취급고 ${c.s.toFixed(2)}억 · 분당취급고 ${c.pm.toFixed(1)}만 · 방송 ${c.cnt}회`;
  return `<div class="hm-cell" style="background:rgba(37,99,235,${alpha});border-color:${borderColor};color:${textColor};" title="${tip}">
    <div class="hm-pm">${c.pm.toFixed(0)}</div>
    <div class="hm-w">${c.w.toFixed(0)}분</div>
  </div>`;
}

function renderSummary(result, cnt){
  const { totalW, totalS, totalCnt, avgPm } = result;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="sum-card"><div class="sum-label">누적 가중분</div><div class="sum-val">${totalW.toFixed(0)}<span class="sum-unit">분</span></div></div>
    <div class="sum-card"><div class="sum-label">누적 취급고 (VAT포함)</div><div class="sum-val" style="color:var(--blue);">${totalS.toFixed(2)}<span class="sum-unit">억</span></div></div>
    <div class="sum-card"><div class="sum-label">통합 분당취급고</div><div class="sum-val">${avgPm.toFixed(1)}<span class="sum-unit">만/분</span></div></div>
    <div class="sum-card"><div class="sum-label">방송 횟수</div><div class="sum-val">${totalCnt}<span class="sum-unit">회</span></div></div>
    <div class="sum-card"><div class="sum-label">대상 상품 수</div><div class="sum-val">${cnt}<span class="sum-unit">개</span></div></div>
  `;
}

function renderInsight(result){
  const { grid, totalW, avgPm } = result;
  if(totalW<=0){
    document.getElementById('insightBox').innerHTML = `<div class="insight-line">⚠️ 편성 데이터가 없습니다.</div>`;
    return;
  }
  let topPm=null, topW=null;
  for(let di=0; di<7; di++){
    for(let h=0; h<24; h++){
      const c = grid[di][h];
      if(c.w<=0) continue;
      if(c.w >= 5 && (!topPm || c.pm > topPm.pm)) topPm = {di, h, pm:c.pm};
      if(!topW || c.w > topW.w) topW = {di, h, w:c.w};
    }
  }
  const lines = [];
  if(topPm){
    lines.push(`<div class="insight-line">📌 <b>${DAY_LABELS[topPm.di]}요일 ${topPm.h}시대</b>가 분당취급고 <b>${topPm.pm.toFixed(1)}만원</b>으로 가장 효율이 높습니다 (전체 평균 ${avgPm.toFixed(1)}만원 대비 ${(topPm.pm/avgPm*100).toFixed(0)}%).</div>`);
  }
  if(topW){
    const conc = (topW.w/totalW*100);
    lines.push(`<div class="insight-line">📌 가중분은 <b>${DAY_LABELS[topW.di]}요일 ${topW.h}시대</b>에 가장 많이 편성되어 있습니다 (${topW.w.toFixed(0)}분 · 전체의 ${conc.toFixed(1)}%).</div>`);
    if(conc > 30){
      lines.push(`<div class="insight-line insight-warn">⚠️ 특정 요일·시간대 편성 집중도가 ${conc.toFixed(0)}%로 높습니다 — 편성 분산 검토가 필요합니다.</div>`);
    }
  }
  document.getElementById('insightBox').innerHTML = lines.join('');
}

function renderHeatmapGrid(result){
  const { grid, maxW, avgPm } = result;
  let headHTML = `<div class="hm-headcell hm-corner" style="position:sticky;left:0;z-index:3;">요일\\시</div>`;
  for(let h=0; h<24; h++){ headHTML += `<div class="hm-headcell">${h}시</div>`; }
  headHTML += `<div class="hm-headcell">합계</div>`;

  let bodyHTML = '';
  for(let di=0; di<7; di++){
    let rowW=0, rowS=0, rowCells='';
    for(let h=0; h<24; h++){
      const c = grid[di][h];
      rowW += c.w; rowS += c.s;
      rowCells += cellHTML(c, maxW, avgPm);
    }
    const rowPm = rowW>0 ? (rowS*10000/rowW) : 0;
    bodyHTML += `<div class="hm-daylabel" style="position:sticky;left:0;z-index:2;background:var(--bg3);">${DAY_LABELS[di]}</div>${rowCells}<div class="hm-total">${rowW>0?rowPm.toFixed(0):'-'}${rowW>0?'<span style="font-size:8px;font-weight:400;">만</span>':''}</div>`;
  }

  let colTotalsCells = '';
  let grandW=0, grandS=0;
  for(let h=0; h<24; h++){
    let cw=0, cs=0;
    for(let di=0; di<7; di++){ cw += grid[di][h].w; cs += grid[di][h].s; }
    grandW += cw; grandS += cs;
    const cpm = cw>0 ? (cs*10000/cw) : 0;
    colTotalsCells += `<div class="hm-total">${cw>0?cpm.toFixed(0):'-'}</div>`;
  }
  const grandPm = grandW>0 ? (grandS*10000/grandW) : 0;
  bodyHTML += `<div class="hm-daylabel" style="position:sticky;left:0;z-index:2;background:var(--bg3);">합계</div>${colTotalsCells}<div class="hm-total" style="background:var(--blue-bg);color:var(--blue);">${grandW>0?grandPm.toFixed(0):'-'}<span style="font-size:8px;">만</span></div>`;

  document.getElementById('hmGrid').innerHTML = headHTML + bodyHTML;
}

function renderHeatmapFor(product){
  currentTarget = product;
  const bcList = product ? (product.bc||[]) : ALL_BC;
  const result = buildGrid(bcList);
  const cnt = product ? 1 : DATA.length;

  if(product){
    document.getElementById('targetTitle').textContent = `${product.brand} · ${product.name}`;
    document.getElementById('targetBadge').textContent = product.cat;
    document.getElementById('targetBadge').style.color = CAT_COLORS[product.cat]||'var(--purple)';
    document.getElementById('targetBadge').style.background = (CAT_COLORS[product.cat]||'#6D3FC8')+'18';
    document.getElementById('targetSub').textContent = `MD: ${product.md} · 누적 ${product.cnt}회 방송 · 이 상품의 요일×시간대별 편성 분포`;
  } else {
    document.getElementById('targetTitle').textContent = '전체 가전팀 합산';
    document.getElementById('targetBadge').textContent = '전체 합산';
    document.getElementById('targetBadge').style.color = 'var(--purple)';
    document.getElementById('targetBadge').style.background = 'var(--purple-bg)';
    document.getElementById('targetSub').textContent = '97개 상품 전체 누적 편성 — 상품을 검색해 특정 상품으로 전환할 수 있습니다';
  }

  renderSummary(result, cnt);
  renderHeatmapGrid(result);
  renderInsight(result);
}

function renderHeatmapForCategory(cat){
  currentTarget = null;
  const catProducts = DATA.filter(p => p.cat === cat);
  const bcList = catProducts.flatMap(p => p.bc||[]);
  const result = buildGrid(bcList);
  const catColor = CAT_COLORS[cat] || '#8A97B0';

  document.getElementById('targetTitle').textContent = `${cat} 카테고리 합산`;
  document.getElementById('targetBadge').textContent = cat;
  document.getElementById('targetBadge').style.color = catColor;
  document.getElementById('targetBadge').style.background = catColor+'18';
  document.getElementById('targetSub').textContent = `${catProducts.length}개 상품 누적 — 카테고리 전체의 요일×시간대별 편성 분포`;

  renderSummary(result, catProducts.length);
  renderHeatmapGrid(result);
  renderInsight(result);
}

function onInput(val){
  currentQ = val.trim();
  document.getElementById('clearBtn').style.display = currentQ ? 'block' : 'none';
  renderResultsList();
}
function clearSearch(){
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  currentQ = '';
  renderResultsList();
  if(currentCat){ renderHeatmapForCategory(currentCat); }
  else { renderHeatmapFor(null); }
}
function filterCat(cat){
  currentCat = cat;
  document.querySelectorAll('[id^="fc-"]').forEach(b => b.classList.remove('active-tab'));
  document.getElementById('fc-'+(cat||'all')).classList.add('active-tab');
  renderResultsList();
  if(!currentQ){
    if(cat){ renderHeatmapForCategory(cat); }
    else { renderHeatmapFor(null); }
  }
}

function renderResultsList(){
  const bar = document.getElementById('resultsBar');
  if(!currentQ && !currentCat){
    bar.style.display = 'none';
    return;
  }
  const q = currentQ.toLowerCase();
  let filtered = DATA.filter(p => {
    const mc = !currentCat || p.cat === currentCat;
    const mq = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q) ||
               p.md.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return mc && mq;
  });
  filtered.sort((a,b) => b.s - a.s);
  bar.style.display = 'block';

  if(filtered.length === 0){
    document.getElementById('resultsHint').textContent = `'${currentQ}'에 해당하는 상품이 없습니다`;
    document.getElementById('prList').innerHTML = '';
    return;
  }
  document.getElementById('resultsHint').innerHTML = `<b style="color:var(--blue);">${filtered.length}개</b> 상품 검색됨 — 클릭하면 해당 상품의 히트맵으로 전환됩니다`;
  document.getElementById('prList').innerHTML = filtered.slice(0,40).map((p) => {
    const catColor = CAT_COLORS[p.cat] || '#8A97B0';
    const isSel = currentTarget && currentTarget.name===p.name && currentTarget.brand===p.brand;
    return `<div class="pr-item ${isSel?'selected':''}" onclick='selectProductByKey(${JSON.stringify(p.brand)}, ${JSON.stringify(p.name)})'>
      <div class="pr-left">
        <div class="pr-brand">${p.brand}</div>
        <div class="pr-name">${p.name}</div>
        <div class="pr-meta">MD ${p.md} · ${p.cnt}회 방송</div>
      </div>
      <div class="pr-right">
        <span class="pr-cat" style="color:${catColor};background:${catColor}18;">${p.cat}</span>
        <span class="pr-s">${p.s.toFixed(2)}억</span>
      </div>
    </div>`;
  }).join('');
}

function selectProductByKey(brand, name){
  const p = DATA.find(d => d.brand===brand && d.name===name);
  if(!p) return;
  renderHeatmapFor(p);
  renderResultsList();
  window.scrollTo({top: document.querySelector('.content').offsetTop - 80, behavior:'smooth'});
}
</script>
