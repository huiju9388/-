<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가전팀 브랜드·상품 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#EEF1F7; --bg2:#F8F9FC; --bg3:#F0F3F8;
    --border:rgba(99,120,160,0.12); --border2:rgba(99,120,160,0.22);
    --text1:#1E2840; --text2:#4A5568; --text3:#8A97B0;
    --green:#0E9E6A; --green-bg:rgba(14,158,106,0.10);
    --amber:#C97A10; --amber-bg:rgba(201,122,16,0.10);
    --red:#D63A52;   --red-bg:rgba(214,58,82,0.10);
    --blue:#2563EB;  --blue-bg:rgba(37,99,235,0.10);
    --purple:#6D3FC8; --purple-bg:rgba(109,63,200,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text1);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;}

  /* 헤더 */
  .page-header{background:var(--bg2);border-bottom:2px solid var(--border2);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(30,40,64,0.08);}
  .page-header-left{display:flex;align-items:center;gap:14px;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:12px;font-weight:500;text-decoration:none;transition:all .15s;font-family:'IBM Plex Mono',monospace;}
  .back-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:rgba(37,99,235,0.3);}
  .page-title{font-size:18px;font-weight:700;color:var(--text1);letter-spacing:-0.3px;}
  .page-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
  .page-tag{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:5px;border:1px solid rgba(37,99,235,0.35);color:var(--blue);background:var(--blue-bg);}
  .header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .nav-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--blue);color:#fff;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;font-family:'IBM Plex Mono',monospace;box-shadow:0 2px 8px rgba(37,99,235,0.25);transition:all .2s;}
  .nav-link:hover{transform:translateY(-1px);}

  /* 검색 */
  .search-wrap{background:var(--bg2);border-bottom:1px solid var(--border2);padding:18px 28px;box-shadow:0 2px 6px rgba(30,40,64,0.05);}
  .search-input-wrap{position:relative;margin-bottom:14px;}
  .search-input{width:100%;padding:13px 18px 13px 46px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text1);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:all .2s;box-shadow:0 2px 6px rgba(30,40,64,0.06);}
  .search-input:focus{border-color:rgba(37,99,235,0.5);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,0.12);}
  .search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.45;}
  .search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text3);font-size:11px;padding:3px 8px;cursor:pointer;display:none;font-family:'IBM Plex Mono',monospace;}
  .search-clear:hover{background:var(--red-bg);color:var(--red);}
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .filter-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-right:4px;}
  .tab-btn{padding:6px 16px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500;}
  .tab-btn:hover{background:var(--bg2);color:var(--text1);}
  .active-tab{background:var(--blue)!important;border-color:var(--blue)!important;color:#fff!important;font-weight:600!important;}

  /* 결과 */
  .results-area{padding:18px 28px 60px;}
  .result-summary{font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace;margin-bottom:12px;}
  .result-count{font-weight:700;color:var(--blue);}
  .sort-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
  .sort-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .sort-btn{padding:4px 12px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text2);cursor:pointer;transition:all .15s;}
  .sort-btn:hover{background:var(--bg2);color:var(--text1);}
  .sort-active{background:var(--blue-bg)!important;color:var(--blue)!important;border-color:rgba(37,99,235,0.4)!important;font-weight:700!important;}

  /* 상품 카드 */
  .sr-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:12px;transition:all .2s;box-shadow:0 2px 6px rgba(30,40,64,0.05);overflow:hidden;}
  .sr-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(30,40,64,0.10);}

  /* 카드 헤더 */
  .sr-card-header{padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;}
  .sr-card-header:hover{background:rgba(99,120,160,0.03);}
  .sr-name-wrap{flex:1;min-width:0;}
  .sr-brand{font-size:11px;font-weight:700;color:var(--blue);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}
  .sr-name{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:4px;}
  .sr-meta{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .sr-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;margin-left:14px;}
  .sr-badges{display:flex;gap:5px;}
  .sr-badge{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:20px;font-weight:600;}
  .sr-total{font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace;}

  /* 집계 지표 */
  .sr-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 20px 14px;}
  .sr-metric{background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
  .sr-mlabel{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:4px;font-weight:500;}
  .sr-mval{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text1);}
  .sr-msub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace;}

  /* 방송별 실적 테이블 */
  .bc-section{border-top:1px solid var(--border);}
  .bc-header{padding:10px 20px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-top:1px solid var(--border);}
  .bc-header:hover{background:rgba(99,120,160,0.08);}
  .bc-header-title{font-size:11px;font-weight:600;color:var(--text2);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px;}
  .bc-toggle{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
  .bc-table{width:100%;border-collapse:collapse;display:none;}
  .bc-table.open{display:table;}
  .bc-table th{text-align:left;padding:9px 20px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border2);background:var(--bg3);font-family:'IBM Plex Mono',monospace;}
  .bc-table td{padding:9px 20px;font-size:12px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;color:var(--text1);}
  .bc-table tr:last-child td{border-bottom:none;}
  .bc-table tr:hover td{background:rgba(99,120,160,0.04);}
  .bc-rank{color:var(--text3);font-size:11px;}
  .bc-date{color:var(--text2);}
  .bc-time{color:var(--text3);font-size:11px;}
  .bc-good{color:#0A8558;font-weight:600;}
  .bc-bad{color:#C42E45;font-weight:600;}
  .bc-normal{color:var(--text1);}

  /* 빈 상태 */
  .empty-state{text-align:center;padding:60px 20px;}
  .empty-icon{font-size:48px;margin-bottom:14px;}
  .empty-msg{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500;}
  .empty-sub{font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}

  .hl{background:rgba(37,99,235,0.15);border-radius:2px;padding:0 2px;color:var(--blue);font-weight:700;}

  @media(max-width:640px){
    .sr-metrics{grid-template-columns:repeat(2,1fr);}
    .page-header,.search-wrap,.results-area{padding-left:16px;padding-right:16px;}
    .bc-table th,.bc-table td{padding:8px 12px;}
  }
</style>
</head>

<div id="pwGateOverlay" style="position:fixed;inset:0;z-index:99999;background:#1E2840;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans KR',sans-serif;">
  <div style="background:#F8F9FC;border-radius:16px;padding:36px 32px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,0.3);text-align:center;">
    <div style="font-size:28px;margin-bottom:8px;">🔒</div>
    <div style="font-size:15px;font-weight:700;color:#1E2840;margin-bottom:4px;">가전팀 전용 페이지</div>
    <div style="font-size:11px;color:#8A97B0;margin-bottom:18px;">팀 비밀번호를 입력해주세요</div>
    <input type="password" id="pwGateInput" placeholder="비밀번호" style="width:100%;padding:10px 12px;border:1px solid rgba(99,120,160,0.3);border-radius:8px;font-size:13px;margin-bottom:10px;box-sizing:border-box;outline:none;" autocomplete="off">
    <button onclick="pwGateCheck()" style="width:100%;padding:10px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">입장</button>
    <div id="pwGateError" style="font-size:11px;color:#D63A52;margin-top:10px;display:none;">비밀번호가 올바르지 않습니다</div>
  </div>
</div>
<script>
(function(){
  var PW_HASH = "ed268775853e8ce7516aca7017150b900240141f2e6d7273d8ea84dc6a7c2fdb";
  var SESSION_KEY = "appliance_team_auth_2026";
  function sha256(str){
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    });
  }
  function unlock(){
    document.getElementById('pwGateOverlay').style.display = 'none';
    document.documentElement.style.overflow = '';
  }
  // 이미 인증된 세션이면 바로 통과
  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    unlock();
  } else {
    document.documentElement.style.overflow = 'hidden';
  }
  window.pwGateCheck = function(){
    var val = document.getElementById('pwGateInput').value;
    sha256(val).then(function(hash){
      if (hash === PW_HASH) {
        sessionStorage.setItem(SESSION_KEY, 'ok');
        unlock();
      } else {
        document.getElementById('pwGateError').style.display = 'block';
        document.getElementById('pwGateInput').value = '';
      }
    });
  };
  document.addEventListener('DOMContentLoaded', function(){
    var input = document.getElementById('pwGateInput');
    if (input) {
      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter') pwGateCheck();
      });
      input.focus();
    }
  });
})();
</script>

<div class="search-wrap">
  <div class="search-input-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" class="search-input"
      placeholder="브랜드명 또는 상품명 입력  (예: 코지마, 히트락, 밀폐용기, 마영호...)"
      oninput="onInput(this.value)"/>
    <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕ 지우기</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">카테고리</span>
    <button onclick="filterCat('')"       id="fc-all"    class="tab-btn active-tab">전체</button>
    <button onclick="filterCat('생활가전')" id="fc-생활가전" class="tab-btn">🏠 생활가전</button>
    <button onclick="filterCat('주방가전')" id="fc-주방가전" class="tab-btn">🍳 주방가전</button>
    <button onclick="filterCat('주방용품')" id="fc-주방용품" class="tab-btn">🍳 주방용품</button>
    <button onclick="filterCat('대형가전')" id="fc-대형가전" class="tab-btn">📦 대형가전</button>
  </div>
</div>

<div class="results-area">
  <div class="result-summary" id="summary"></div>
  <div class="sort-row">
    <span class="sort-label">정렬</span>
    <button onclick="setSort('s')"   id="sort-s"   class="sort-btn sort-active">취급고 ↓</button>
    <button onclick="setSort('pm')"  id="sort-pm"  class="sort-btn">분당취급고 ↓</button>
    <button onclick="setSort('m')"   id="sort-m"   class="sort-btn">한계이익 ↓</button>
    <button onclick="setSort('mr')"  id="sort-mr"  class="sort-btn">이익률 ↓</button>
    <button onclick="setSort('cnt')" id="sort-cnt" class="sort-btn">방송횟수 ↓</button>
  </div>
  <div id="results"></div>
</div>

<script>
let DATA = [];
fetch('data/search-data.json').then(r => r.json()).then(d => { DATA = d; render(); })
  .catch(e => { document.getElementById('results').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-msg">데이터를 불러오지 못했습니다</div></div>'; console.error(e); });

const CAT_COLORS = {
  '생활가전':'#2563EB','주방가전':'#0E9E6A','주방용품':'#6D3FC8','대형가전':'#C97A10'
};
const SHIN_COLORS = {
  '신상품':['#6D3FC8','rgba(109,63,200,0.12)'],
  '재녹화':['#2563EB','rgba(37,99,235,0.12)'],
  '재편집':['#0E9E6A','rgba(14,158,106,0.12)'],
};
const MON = ['','1월','2월','3월','4월','5월','6월'];

let currentCat='', currentSort='s', currentQ='';

function onInput(val){
  currentQ=val.trim();
  document.getElementById('clearBtn').style.display=currentQ?'block':'none';
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').style.display='none';
  currentQ=''; render();
}
function filterCat(cat){
  currentCat=cat;
  document.querySelectorAll('[id^="fc-"]').forEach(b=>b.classList.remove('active-tab'));
  document.getElementById('fc-'+(cat||'all')).classList.add('active-tab');
  render();
}
function setSort(key){
  currentSort=key;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('sort-active'));
  document.getElementById('sort-'+key).classList.add('sort-active');
  render();
}
function hl(text,q){
  if(!q) return text;
  return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>');
}
function toggleBc(id){
  const tbl=document.getElementById('bc-'+id);
  const btn=document.getElementById('btn-'+id);
  const isOpen=tbl.classList.toggle('open');
  btn.textContent=isOpen?'▲ 접기':'▼ 방송별 실적 펼치기';
}

function pmColor(pm, avg){
  if(pm>=avg*1.2) return 'bc-good';
  if(pm<avg*0.8)  return 'bc-bad';
  return 'bc-normal';
}

function render(){
  const q=currentQ.toLowerCase();
  let filtered=DATA.filter(p=>{
    const mc=!currentCat||p.cat===currentCat;
    const mq=!q||p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q)||
              p.md.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    return mc&&mq;
  });
  filtered.sort((a,b)=>b[currentSort]-a[currentSort]);

  const totalS  = filtered.reduce((a,p)=>a+p.s,  0);
  const totalM  = filtered.reduce((a,p)=>a+p.m,  0);
  const totalW  = filtered.reduce((a,p)=>a+p.w,  0);
  const totalCnt= filtered.reduce((a,p)=>a+p.cnt, 0);
  const totalPm = totalW>0 ? (totalS*100000000)/(totalW*10000) : 0;
  const totalPmm= totalW>0 ? (totalM*100000000)/(totalW*10000) : 0;

  const sumEl = document.getElementById('summary');
  if(filtered.length===0){ sumEl.innerHTML=''; }
  else if(currentQ || currentCat){
    const label = currentQ || currentCat;
    sumEl.innerHTML=`
      <div style="background:var(--bg2);border:1.5px solid rgba(37,99,235,0.25);border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 3px 10px rgba(37,99,235,0.08);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div>
            <span style="font-size:13px;font-weight:700;color:var(--text1);">"${label}" 누적 실적 요약</span>
            <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-left:10px;">${filtered.length}개 상품 · 총 ${totalCnt}회 방송</span>
          </div>
          <span style="font-size:10px;color:var(--blue);font-family:'IBM Plex Mono',monospace;background:var(--blue-bg);padding:3px 9px;border-radius:5px;font-weight:600;">1~6월2주차 누적</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border);text-align:center;">
            <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px;font-weight:500;">누적 가중분</div>
            <div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text1);">${totalW.toFixed(0)}<span style="font-size:11px;font-weight:400;color:var(--text3);">분</span></div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border);text-align:center;">
            <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px;font-weight:500;">누적 취급고</div>
            <div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#2563EB;">${totalS.toFixed(1)}<span style="font-size:11px;font-weight:400;color:var(--text3);">억</span></div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border);text-align:center;">
            <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px;font-weight:500;">분당취급고</div>
            <div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text1);">${totalPm.toFixed(1)}<span style="font-size:11px;font-weight:400;color:var(--text3);">만</span></div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border);text-align:center;">
            <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px;font-weight:500;">누적 한계이익</div>
            <div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#0A8558;">${totalM.toFixed(1)}<span style="font-size:11px;font-weight:400;color:var(--text3);">억</span></div>
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border);text-align:center;">
            <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px;font-weight:500;">분당한계이익</div>
            <div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#0A8558;">${totalPmm.toFixed(1)}<span style="font-size:11px;font-weight:400;color:var(--text3);">만</span></div>
          </div>
        </div>
      </div>`;
  } else {
    sumEl.innerHTML=`<div style="font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace;margin-bottom:12px;">
      <span style="font-weight:700;color:var(--blue);">${filtered.length}개 상품</span>
      &nbsp;·&nbsp; 취급고 합계 <b>${totalS.toFixed(1)}억</b>
      &nbsp;·&nbsp; 한계이익 합계 <b>${totalM.toFixed(1)}억</b>
    </div>`;
  }

  const res=document.getElementById('results');
  if(filtered.length===0){
    res.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🔎</div>
      <div class="empty-msg">'${currentQ}'에 해당하는 상품이 없습니다</div>
      <div class="empty-sub">브랜드명, 상품명, MD명, 카테고리로 검색해보세요</div>
    </div>`;
    return;
  }

  res.innerHTML=filtered.map((p,idx)=>{
    const catColor=CAT_COLORS[p.cat]||'#8A97B0';
    const shinInfo=SHIN_COLORS[p.shin];
    const shinBadge=shinInfo?`<span class="sr-badge" style="color:${shinInfo[0]};background:${shinInfo[1]};">${p.shin}</span>`:'';
    const monthsStr=p.months.map(m=>m+'월').join(' · ');
    const nameHl=hl(p.name,q);
    const brandHl=hl(p.brand,q);
    const mdHl=hl(p.md,q);
    const uid='p'+idx;

    // 방송별 실적 테이블 행 생성
    const bcRows=p.bc.map((bc,i)=>{
      const pmCls=pmColor(bc.pm, p.pm);
      const pmmCls=bc.pmm>=p.pmm*1.1?'bc-good':bc.pmm<p.pmm*0.8?'bc-bad':'bc-normal';
      // 날짜 포맷
      const dateParts=bc.d.split('/');
      const dateStr=dateParts.length===3?`${dateParts[1]}/${dateParts[2]}`:(bc.d||'-');
      const monLabel=bc.m?MON[parseInt(bc.m)]||'':'';
      return `<tr>
        <td class="bc-rank">${i+1}</td>
        <td class="bc-date">${dateStr} <span style="color:var(--text3);font-size:10px;">(${monLabel})</span></td>
        <td class="bc-time">${bc.t||'-'}</td>
        <td>${bc.w.toFixed(0)}분</td>
        <td><b>${bc.s.toFixed(3)}억</b></td>
        <td class="${pmCls}">${bc.pm.toFixed(1)}만</td>
        <td>${bc.im.toFixed(3)}억</td>
        <td class="${pmmCls}">${bc.pmm.toFixed(1)}만</td>
      </tr>`;
    }).join('');

    return `<div class="sr-card">
      <div class="sr-card-header" onclick="toggleBc('${uid}')">
        <div class="sr-name-wrap">
          <div class="sr-brand">${brandHl}</div>
          <div class="sr-name">${nameHl}</div>
          <div class="sr-meta">MD: ${mdHl} &nbsp;·&nbsp; ${p.cnt}회 방송 &nbsp;·&nbsp; ${monthsStr}</div>
        </div>
        <div class="sr-header-right">
          <div class="sr-badges">
            <span class="sr-badge" style="color:${catColor};background:${catColor}18;">${p.cat}</span>
            ${shinBadge}
          </div>
          <div class="sr-total" style="color:${catColor};">${p.s.toFixed(2)}억</div>
        </div>
      </div>

      <div class="sr-metrics">
        <div class="sr-metric">
          <div class="sr-mlabel">취급고 (VAT포함)</div>
          <div class="sr-mval" style="color:${catColor};">${p.s.toFixed(2)}억</div>
          <div class="sr-msub">총 ${p.w.toFixed(0)}분 방송</div>
        </div>
        <div class="sr-metric">
          <div class="sr-mlabel">분당취급고</div>
          <div class="sr-mval">${p.pm.toFixed(1)}만</div>
          <div class="sr-msub">원/분</div>
        </div>
        <div class="sr-metric">
          <div class="sr-mlabel">한계이익</div>
          <div class="sr-mval" style="color:#0A8558;">${p.m.toFixed(2)}억</div>
          <div class="sr-msub">이익률 ${p.mr}%</div>
        </div>
        <div class="sr-metric">
          <div class="sr-mlabel">분당한계이익</div>
          <div class="sr-mval" style="color:#0A8558;">${p.pmm.toFixed(1)}만</div>
          <div class="sr-msub">원/분</div>
        </div>
      </div>

      <div class="bc-section">
        <div class="bc-header" onclick="toggleBc('${uid}')">
          <div class="bc-header-title">
            📋 방송별 실적
            <span style="background:var(--blue-bg);color:var(--blue);font-size:10px;padding:2px 7px;border-radius:10px;">${p.cnt}회</span>
            <span style="font-size:10px;color:var(--text3);font-weight:400;">· 초록: 평균↑ &nbsp; 빨강: 평균↓</span>
          </div>
          <span class="bc-toggle" id="btn-${uid}">▼ 방송별 실적 펼치기</span>
        </div>
        <table class="bc-table" id="bc-${uid}">
          <thead>
            <tr>
              <th>#</th>
              <th>날짜</th>
              <th>방송 시간</th>
              <th>가중분</th>
              <th>취급고</th>
              <th>분당취급고</th>
              <th>한계이익</th>
              <th>분당이익</th>
            </tr>
          </thead>
          <tbody>${bcRows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

</script>
</body>
</html>
