<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가전팀 브랜드·상품 검색</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:  #EEF1F7;
    --bg2: #F8F9FC;
    --bg3: #F0F3F8;
    --border:  rgba(99,120,160,0.12);
    --border2: rgba(99,120,160,0.22);
    --text1: #1E2840;
    --text2: #4A5568;
    --text3: #8A97B0;
    --green:  #0E9E6A; --green-bg:  rgba(14,158,106,0.10);
    --amber:  #C97A10; --amber-bg:  rgba(201,122,16,0.10);
    --red:    #D63A52; --red-bg:    rgba(214,58,82,0.10);
    --blue:   #2563EB; --blue-bg:   rgba(37,99,235,0.10);
    --purple: #6D3FC8; --purple-bg: rgba(109,63,200,0.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text1); font-family:'Noto Sans KR',sans-serif; font-size:13px; line-height:1.6; min-height:100vh; }

  /* 헤더 */
  .page-header {
    background:var(--bg2);
    border-bottom:2px solid var(--border2);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:100;
    box-shadow:0 2px 10px rgba(30,40,64,0.08);
  }
  .page-header-left { display:flex; align-items:center; gap:14px; }
  .back-btn {
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 14px;background:var(--bg3);
    border:1px solid var(--border2);border-radius:7px;
    color:var(--text2);font-size:12px;font-weight:500;
    text-decoration:none;transition:all .15s;
    font-family:'IBM Plex Mono',monospace;
  }
  .back-btn:hover { background:var(--blue-bg);color:var(--blue);border-color:rgba(37,99,235,0.3); }
  .page-title { font-size:18px;font-weight:700;color:var(--text1);letter-spacing:-0.3px; }
  .page-sub { font-size:11px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace; }
  .page-tag { font-size:10px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:5px;border:1px solid rgba(37,99,235,0.35);color:var(--blue);background:var(--blue-bg); }

  /* 검색 영역 */
  .search-wrap {
    background:var(--bg2);
    border-bottom:1px solid var(--border2);
    padding:20px 28px;
    box-shadow:0 2px 6px rgba(30,40,64,0.05);
  }
  .search-input-wrap { position:relative; margin-bottom:14px; }
  .search-input {
    width:100%;padding:13px 18px 13px 46px;
    background:var(--bg3);border:1.5px solid var(--border2);
    border-radius:10px;color:var(--text1);font-size:14px;
    font-family:'Noto Sans KR',sans-serif;outline:none;
    transition:all .2s;box-shadow:0 2px 6px rgba(30,40,64,0.06);
  }
  .search-input:focus {
    border-color:rgba(37,99,235,0.5);
    background:#fff;
    box-shadow:0 0 0 3px rgba(37,99,235,0.12);
  }
  .search-icon { position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.45; }
  .search-clear {
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:var(--bg3);border:1px solid var(--border2);border-radius:5px;
    color:var(--text3);font-size:11px;padding:3px 8px;cursor:pointer;
    display:none;transition:all .15s;font-family:'IBM Plex Mono',monospace;
  }
  .search-clear:hover { background:var(--red-bg);color:var(--red);border-color:rgba(214,58,82,0.3); }
  .filter-row { display:flex;gap:6px;flex-wrap:wrap;align-items:center; }
  .filter-label { font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-right:4px; }
  .tab-btn {
    padding:6px 16px;font-size:11px;font-family:'IBM Plex Mono',monospace;
    background:var(--bg3);border:1px solid var(--border2);border-radius:20px;
    color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500;
  }
  .tab-btn:hover { background:var(--bg2);color:var(--text1);border-color:var(--border2); }
  .active-tab { background:var(--blue) !important;border-color:var(--blue) !important;color:#fff !important;font-weight:600 !important; }

  /* 결과 영역 */
  .results-area { padding:20px 28px 60px; }
  .result-summary {
    font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace;
    margin-bottom:16px;display:flex;align-items:center;gap:12px;
  }
  .result-count { font-weight:600;color:var(--blue); }
  .result-total { color:var(--text3); }

  /* 정렬 옵션 */
  .sort-row { display:flex;gap:6px;margin-bottom:14px; }
  .sort-label { font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;align-self:center;margin-right:4px; }
  .sort-btn {
    padding:4px 12px;font-size:10px;font-family:'IBM Plex Mono',monospace;
    background:var(--bg3);border:1px solid var(--border2);border-radius:5px;
    color:var(--text2);cursor:pointer;transition:all .15s;
  }
  .sort-btn:hover { background:var(--bg2);color:var(--text1); }
  .sort-active { background:var(--blue-bg) !important;color:var(--blue) !important;border-color:rgba(37,99,235,0.4) !important;font-weight:600 !important; }

  /* 상품 카드 */
  .sr-card {
    background:var(--bg2);border:1px solid var(--border);border-radius:12px;
    padding:18px 20px;margin-bottom:10px;transition:all .2s;
    box-shadow:0 2px 6px rgba(30,40,64,0.05);
  }
  .sr-card:hover { border-color:var(--border2);box-shadow:0 4px 16px rgba(30,40,64,0.10);transform:translateY(-1px); }
  .sr-header { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px; }
  .sr-name-wrap { flex:1;min-width:0; }
  .sr-brand { font-size:11px;font-weight:700;color:var(--blue);font-family:'IBM Plex Mono',monospace;margin-bottom:3px; }
  .sr-name { font-size:14px;font-weight:600;color:var(--text1);margin-bottom:4px; }
  .sr-meta { font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace; }
  .sr-badges { display:flex;gap:5px;flex-shrink:0;margin-left:12px; }
  .sr-badge { font-size:9px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:20px;font-weight:600; }

  /* 지표 그리드 */
  .sr-metrics { display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px; }
  .sr-metric { background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border); }
  .sr-mlabel { font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:4px;font-weight:500; }
  .sr-mval { font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text1); }
  .sr-msub { font-size:10px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace; }

  /* 월별 미니 차트 */
  .sr-chart-wrap { display:flex;align-items:flex-end;gap:14px; }
  .sr-chart-label { font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;flex-shrink:0;align-self:center; }
  .sr-chart { display:flex;gap:4px;align-items:flex-end;flex:1;height:48px; }
  .sr-bar-wrap { flex:1;display:flex;flex-direction:column;align-items:center;gap:3px; }
  .sr-bar { width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:opacity .15s; }
  .sr-bval { font-size:8px;font-family:'IBM Plex Mono',monospace;color:var(--text3); }
  .sr-blabel { font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text3); }

  /* 검색 없을 때 */
  .empty-state { text-align:center;padding:60px 20px;color:var(--text3); }
  .empty-icon { font-size:48px;margin-bottom:14px; }
  .empty-msg { font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500; }
  .empty-sub { font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace; }

  /* 하이라이트 */
  .hl { background:rgba(37,99,235,0.15);border-radius:2px;padding:0 2px;color:var(--blue);font-weight:700; }

  /* 반응형 */
  @media(max-width:640px) {
    .sr-metrics { grid-template-columns:repeat(2,1fr); }
    .page-header { padding:14px 16px; }
    .search-wrap { padding:14px 16px; }
    .results-area { padding:14px 16px 40px; }
  }
</style>
</head>

<div class="results-area">

    <button onclick="setSort('cnt')" id="sort-cnt" class="sort-btn">방송횟수 ↓</button>
  </div>
  <div id="results"></div>
</div>

function onInput(val) {
  currentQ = val.trim();

  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  currentQ = '';
  render();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('[id^="fc-"]').forEach(b => b.classList.remove('active-tab'));
  document.getElementById('fc-' + (cat||'all')).classList.add('active-tab');
  render();
}

function setSort(key) {
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('sort-active'));
  document.getElementById('sort-' + key).classList.add('sort-active');
  render();
}

function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'),
    '<span class="hl">$1</span>');
}

    const matchQ   = !q || p.name.toLowerCase().includes(q) ||
      p.brand.toLowerCase().includes(q) || p.md.toLowerCase().includes(q) ||
      p.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  filtered.sort((a,b) => b[currentSort] - a[currentSort]);

  const totalS = filtered.reduce((a,p)=>a+p.s,0);
  const totalM = filtered.reduce((a,p)=>a+p.m,0);
  const totalCnt = filtered.reduce((a,p)=>a+p.cnt,0);

  document.getElementById('summary').innerHTML = filtered.length === 0 ? '' :
    `<span class="result-count">${filtered.length}개 상품</span>
     <span class="result-total">· 취급고 합계 ${totalS.toFixed(1)}억 · 한계이익 ${totalM.toFixed(1)}억 · 총 방송 ${totalCnt}회</span>`;

  const res = document.getElementById('results');
  if (filtered.length === 0) {
    res.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔎</div>
      <div class="empty-msg">검색 결과가 없습니다</div>
      <div class="empty-sub">'${currentQ}'에 해당하는 상품을 찾을 수 없어요</div>
    </div>`;
    return;
  }

  const maxS = Math.max(...filtered.map(p => Math.max(...p.ms)));

  res.innerHTML = filtered.map((p,idx) => {
    const catColor = CAT_COLORS[p.cat] || '#8A97B0';
    const shinInfo = SHIN_COLORS[p.shin];
    const shinBadge = shinInfo
      ? `<span class="sr-badge" style="color:${shinInfo[0]};background:${shinInfo[1]};">${p.shin}</span>` : '';
    const monthsStr = p.months.map(m=>m+'월').join(' · ');
    const nameHl  = hl(p.name, q);
    const brandHl = hl(p.brand, q);
    const mdHl    = hl(p.md, q);

    const bars = p.ms.map((v,i) => {
      const h = maxS > 0 ? Math.max(2, Math.round(v/maxS*40)) : 2;
      const isActive = i===3 ? '#D63A52' : catColor;
      return `<div class="sr-bar-wrap">
        <div class="sr-bval" style="font-size:8px;">${v>0?v.toFixed(1):''}</div>
        <div class="sr-bar" style="height:${h}px;background:${v>0?isActive:'rgba(99,120,160,0.12)'};opacity:${v>0?0.85:1};"></div>
        <div class="sr-blabel">${MONTHS[i].replace('월','')}</div>
      </div>`;
    }).join('');

    return `<div class="sr-card">
      <div class="sr-header">
        <div class="sr-name-wrap">
          <div class="sr-brand">${brandHl}</div>
          <div class="sr-name">${nameHl}</div>
          <div class="sr-meta">MD: ${mdHl} · ${p.cnt}회 방송 · ${monthsStr}</div>
        </div>
        <div class="sr-badges">
          <span class="sr-badge" style="color:${catColor};background:${catColor}18;">${p.cat}</span>
          ${shinBadge}
        </div>
      </div>
      <div class="sr-metrics">
        <div class="sr-metric">
          <div class="sr-mlabel">취급고 (VAT포함)</div>
          <div class="sr-mval" style="color:${catColor};">${p.s.toFixed(2)}억</div>
          <div class="sr-msub">가중분 ${p.w.toFixed(0)}분</div>
        </div>
        <div class="sr-metric">
          <div class="sr-mlabel">분당취급고</div>
          <div class="sr-mval">${p.pm.toFixed(1)}만</div>
          <div class="sr-msub">원/분</div>
        </div>
        <div class="sr-metric">
          <div class="sr-mlabel">한계이익</div>
          <div class="sr-mval" style="color:#0A8558;">${p.m.toFixed(2)}억</div>
          <div class="sr-msub">이익률 ${p.mr}%</div>
        </div>
        <div class="sr-metric">
          <div class="sr-mlabel">분당한계이익</div>
          <div class="sr-mval" style="color:#0A8558;">${p.pmm.toFixed(1)}만</div>
          <div class="sr-msub">원/분</div>
        </div>
      </div>
      <div class="sr-chart-wrap">
        <div class="sr-chart-label">월별 취급고</div>
        <div class="sr-chart">${bars}</div>
      </div>
    </div>`;
  }).join('');
}

// 초기 로드
render();
</script>
</body>
</html>
